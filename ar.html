<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>AR View — Dishify</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <style>
    :root { --gold:#c9a84c; --ink:#070604; --cream:#f0e8d5; --dim:rgba(240,232,213,.6); }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--ink);color:var(--cream);font-family:'Segoe UI',system-ui,sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

    /* TOP BAR */
    .topbar{display:flex;align-items:center;gap:12px;padding:14px 16px;background:rgba(7,6,4,.95);border-bottom:1px solid rgba(201,168,76,.18);flex-shrink:0}
    .back-btn{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.35);color:var(--gold);padding:8px 14px;border-radius:4px;font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;flex-shrink:0}
    .item-name{font-family:Georgia,serif;font-size:1.05rem;color:var(--cream);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    /* VIEWER */
    #viewer-wrap{flex:1;position:relative;overflow:hidden}
    model-viewer{width:100%;height:100%;background-color:#0d0b08;--progress-bar-color:var(--gold);--progress-bar-height:3px}

    /* LOADING */
    #loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#0d0b08;z-index:5;transition:opacity .4s ease}
    #loading.out{opacity:0;pointer-events:none}
    .spin{width:40px;height:40px;border:2px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .9s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .load-txt{font-size:.78rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dim)}

    /* ERROR */
    #error{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:32px;text-align:center;background:#0d0b08;z-index:6}
    #error.show{display:flex}
    .err-icon{font-size:2.4rem}
    .err-msg{font-size:.88rem;color:var(--dim);line-height:1.7;white-space:pre-line}
    .err-back{margin-top:8px;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.35);color:var(--gold);padding:11px 22px;border-radius:4px;font-size:.8rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}

    /* BOTTOM BAR */
    .bottom-bar{flex-shrink:0;padding:14px 16px;background:rgba(7,6,4,.95);border-top:1px solid rgba(201,168,76,.18);display:flex;flex-direction:column;gap:10px}
    .hint{font-size:.75rem;color:var(--dim);text-align:center;line-height:1.6}
    .controls-row{display:flex;gap:10px}
    .ar-btn{flex:1;padding:15px;background:var(--gold);color:var(--ink);border:none;border-radius:4px;font-size:.9rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .18s ease}
    .ar-btn:hover{background:#dbb85c;transform:translateY(-1px)}
    .ar-btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
    .torch-btn{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.35);color:var(--gold);padding:15px 18px;border-radius:4px;font-size:1.1rem;cursor:pointer;flex-shrink:0;transition:all .18s ease}
    .torch-btn.on{background:rgba(201,168,76,.25);border-color:var(--gold);box-shadow:0 0 10px rgba(201,168,76,.3)}
    .torch-btn.hidden{display:none}
  </style>
</head>
<body>

  <div class="topbar">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <div class="item-name" id="item-name">Loading…</div>
  </div>

  <div id="viewer-wrap">
    <div id="loading">
      <div class="spin"></div>
      <div class="load-txt" id="load-txt">Loading model…</div>
    </div>
    <div id="error">
      <div class="err-icon">⚠️</div>
      <div class="err-msg" id="err-msg">Something went wrong.</div>
      <button class="err-back" onclick="goBack()">← Go Back</button>
    </div>
    <model-viewer
      id="mv"
      camera-controls
      touch-action="pan-y"
      auto-rotate
      auto-rotate-delay="600"
      rotation-per-second="18deg"
      ar
      ar-modes="webxr scene-viewer quick-look"
      ar-placement="floor"
      ar-scale="fixed"
      shadow-intensity="2"
      shadow-softness="1"
      environment-image="https://modelviewer.dev/shared-assets/environments/moon_1k.hdr"
      exposure="1.3"
      tone-mapping="commerce"
      reveal="auto"
      loading="eager">
    </model-viewer>
  </div>

  <div class="bottom-bar">
    <div class="hint">Rotate &amp; zoom the model, then tap <strong>View in AR</strong> to place it on your table or floor.</div>
    <div class="controls-row">
      <button class="ar-btn" id="ar-btn" onclick="launchAR()" disabled>📷 &nbsp;View in AR</button>
      <button class="torch-btn hidden" id="torch-btn" onclick="toggleTorch()" title="Flashlight">🔦</button>
    </div>
  </div>

  <script>
    const firebaseConfig={apiKey:"AIzaSyBvfA2VXcrx69iS-3VaCR9lA6mGyn6OicI",authDomain:"dishify-menu.firebaseapp.com",databaseURL:"https://dishify-menu-default-rtdb.firebaseio.com",projectId:"dishify-menu",storageBucket:"dishify-menu.firebasestorage.app",messagingSenderId:"182873179650",appId:"1:182873179650:web:8ff8cf3c04789d9f7b091b"};
    firebase.initializeApp(firebaseConfig);
    const db=firebase.database();

    const params=new URLSearchParams(location.search);
    const rid=params.get('r')||'';
    const itemName=params.get('item')||'';
    const modelParam=params.get('model')||'';

    let _torchTrack=null, _torchOn=false;

    function goBack(){
      if(document.referrer.includes('menu.html')) history.back();
      else window.location.href='menu.html?r='+encodeURIComponent(rid);
    }

    function showError(txt){
      document.getElementById('loading').classList.add('out');
      document.getElementById('err-msg').textContent=txt;
      document.getElementById('error').classList.add('show');
    }

    function convertModelUrl(url){
      if(!url) return '';
      const m1=url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
      if(m1) return 'https://drive.google.com/uc?export=download&id='+m1[1];
      const m2=url.match(/drive\.google\.com\/open\?id=([a-zA-Z0-9_-]+)/);
      if(m2) return 'https://drive.google.com/uc?export=download&id='+m2[1];
      if(url.includes('cloudinary.com')&&!url.includes('fl_attachment'))
        url=url.replace('/upload/','/upload/fl_attachment/');
      return url;
    }

    async function launchAR(){
      const mv=document.getElementById('mv');
      if(!mv) return;
      document.getElementById('torch-btn').classList.remove('hidden');
      if(mv.canActivateAR){ mv.activateAR(); return; }
      // Android Scene Viewer fallback
      if(/android/i.test(navigator.userAgent)&&mv.src){
        window.location.href='intent://arvr.google.com/scene-viewer/1.0?file='+
          encodeURIComponent(mv.src)+'&mode=ar_preferred&resizable=false'+
          '#Intent;scheme=https;package=com.google.android.googlequicksearchbox;'+
          'action=android.intent.action.VIEW;'+
          'S.browser_fallback_url='+encodeURIComponent(mv.src)+';end;';
        return;
      }
      alert('AR is not supported on this device.\nTry Chrome on Android or Safari on iOS.');
    }

    async function toggleTorch(){
      const btn=document.getElementById('torch-btn');
      if(!_torchTrack){
        try{
          const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',advanced:[{torch:true}]}});
          _torchTrack=s.getVideoTracks()[0];
        }catch(e){ btn.style.opacity='.4'; btn.title='Not supported on this device'; return; }
      }
      _torchOn=!_torchOn;
      try{
        await _torchTrack.applyConstraints({advanced:[{torch:_torchOn}]});
        btn.classList.toggle('on',_torchOn);
        btn.textContent=_torchOn?'💡':'🔦';
      }catch(e){ console.warn('torch failed',e); }
    }

    async function init(){
      if(!rid&&!modelParam){
        showError('Missing item info.\nPlease scan the QR code again.');
        return;
      }

      document.getElementById('item-name').textContent=itemName||'AR Preview';

      let modelUrl='';

      if(modelParam){
        modelUrl=convertModelUrl(decodeURIComponent(modelParam));
      }

      if(!modelUrl&&rid&&itemName){
        try{
          const snap=await db.ref('restaurants/'+rid).once('value');
          const restaurant=snap.val();
          if(restaurant&&restaurant.menu){
            const item=Object.values(restaurant.menu).find(i=>i.name===itemName);
            if(item&&item.model){
              modelUrl=convertModelUrl(item.model);
              if(item.emoji) document.getElementById('item-name').textContent=item.emoji+' '+itemName;
            }
          }
        }catch(e){
          showError('Could not connect.\nCheck your internet and try again.');
          return;
        }
      }

      if(!modelUrl){
        showError('No 3D model found for "'+itemName+'".\nAsk the admin to upload a .glb model for this item.');
        return;
      }

      const mv=document.getElementById('mv');
      mv.src=modelUrl;

      mv.addEventListener('load',function(){
        document.getElementById('loading').classList.add('out');
        document.getElementById('ar-btn').disabled=false;
        console.log('[AR] model loaded');
      },{once:true});

      mv.addEventListener('error',function(e){
        console.error('[AR] model-viewer error',e);
        showError('Could not load the 3D model.\nThe file may be broken or the link expired.\nAsk the admin to re-upload the model.');
      },{once:true});

      setTimeout(function(){
        if(!document.getElementById('loading').classList.contains('out'))
          document.getElementById('load-txt').textContent='Still loading… (large file)';
      },7000);
    }

    window.addEventListener('pagehide',function(){
      if(_torchTrack){try{_torchTrack.stop();}catch(e){}}
    });

    init();
  </script>
</body>
</html>
