<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>AR View — Dishify</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <style>
    :root{--gold:#c9a84c;--ink:#070604;--cream:#f0e8d5;--cream-dim:rgba(240,232,213,.65);--green:#4caf7d}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--ink);color:var(--cream);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100dvh;width:100dvw}

    /* ── LOADING ── */
    #loading{position:fixed;inset:0;z-index:9000;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;transition:opacity .5s ease}
    #loading.out{opacity:0;pointer-events:none}
    .ld-logo{font-family:Georgia,serif;font-size:2rem;font-weight:300;color:var(--gold);letter-spacing:.2em}
    .ld-ring{width:50px;height:50px;border:2px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .9s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    #ld-msg{font-size:.76rem;letter-spacing:.22em;text-transform:uppercase;color:var(--cream-dim);text-align:center;padding:0 28px;line-height:1.65;max-width:320px}

    /* ── ERROR ── */
    #error{position:fixed;inset:0;z-index:9000;background:var(--ink);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:36px 28px;text-align:center}
    #error.show{display:flex}
    .err-icon{font-size:2.8rem}
    .err-title{font-family:Georgia,serif;font-size:1.5rem;color:var(--gold)}
    .err-msg{font-size:.84rem;color:var(--cream-dim);line-height:1.75;max-width:340px;white-space:pre-line}
    .err-btn{margin-top:6px;padding:12px 26px;background:var(--gold);color:var(--ink);border:none;border-radius:3px;font-size:.8rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;text-decoration:none;display:inline-block}

    /* ── HUD ── */
    #hud{position:fixed;inset:0;z-index:500;pointer-events:none;display:none}
    #hud.show{display:block}

    #back-btn{position:absolute;top:18px;left:18px;pointer-events:all;background:rgba(7,6,4,.82);border:1px solid rgba(201,168,76,.4);color:var(--gold);padding:10px 16px;border-radius:3px;font-size:.74rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;backdrop-filter:blur(12px)}

    #item-pill{position:absolute;top:18px;left:50%;transform:translateX(-50%);background:rgba(7,6,4,.84);border:1px solid rgba(201,168,76,.35);backdrop-filter:blur(14px);border-radius:40px;padding:9px 18px;display:flex;align-items:center;gap:9px;white-space:nowrap;max-width:calc(100vw - 150px);overflow:hidden}
    #item-emoji{font-size:1.2rem;flex-shrink:0}
    #item-label{font-size:.78rem;font-weight:500;color:var(--cream);overflow:hidden;text-overflow:ellipsis}

    #scan-hint{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(7,6,4,.88);border:1px solid rgba(201,168,76,.3);backdrop-filter:blur(16px);border-radius:16px;padding:18px 22px;text-align:center;max-width:calc(100vw - 48px);width:320px;transition:opacity .4s ease}
    #scan-hint.gone{opacity:0;pointer-events:none}
    .hint-marker{width:64px;height:64px;margin:0 auto 10px;border:2px solid var(--gold);border-radius:6px;padding:3px;opacity:.85}
    .hint-marker svg{display:block;width:100%;height:100%}
    .hint-text{font-size:.76rem;color:var(--cream-dim);line-height:1.6}
    .hint-text strong{color:var(--gold)}

    .corners{position:absolute;top:50%;left:50%;transform:translate(-50%,-52%);width:min(68vw,260px);aspect-ratio:1;pointer-events:none}
    .corners::before,.corners::after,.corners>span::before,.corners>span::after{content:'';position:absolute;width:24px;height:24px;border-color:var(--gold);border-style:solid;animation:pc 2s ease-in-out infinite}
    .corners::before{top:0;left:0;border-width:2px 0 0 2px}
    .corners::after{top:0;right:0;border-width:2px 2px 0 0}
    .corners>span::before{bottom:0;left:0;border-width:0 0 2px 2px}
    .corners>span::after{bottom:0;right:0;border-width:0 2px 2px 0}
    @keyframes pc{0%,100%{opacity:.4}50%{opacity:1}}
    #hud.found .corners{display:none}

    #found-badge{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(76,175,125,.14);border:1px solid rgba(76,175,125,.5);backdrop-filter:blur(14px);border-radius:40px;padding:10px 24px;font-size:.75rem;font-weight:600;color:var(--green);letter-spacing:.15em;text-transform:uppercase;opacity:0;transition:opacity .4s ease;pointer-events:none;white-space:nowrap}
    #found-badge.show{opacity:1}

    a-scene{position:fixed;inset:0}

    /* ── MINDAR CAMERA FEED FIX ──────────────────────────────────────────────
       MindAR injects a <video> (camera feed) and a <canvas> (AR overlay)
       directly into <body>. Without explicit sizing they collapse to 0×0 or
       get painted over by the black body background, producing a black frame.
       These rules pin both elements to the full viewport behind the HUD.    */
    body > video,
    #ar-scene video,
    .mindar-ui-overlay video,
    video[autoplay] {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100vw !important; height: 100vh !important;
      object-fit: cover !important;
      z-index: 0 !important;
      background: transparent !important;
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }

    /* MindAR's own overlay canvas (drawn on top of video, under A-Frame) */
    body > canvas:not([id]),
    .mindar-ui-overlay canvas {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100vw !important; height: 100vh !important;
      z-index: 1 !important;
      background: transparent !important;
      pointer-events: none !important;
    }

    /* A-Frame's own WebGL canvas must also be transparent so video shows through */
    a-scene canvas {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100vw !important; height: 100vh !important;
      z-index: 2 !important;
      background: transparent !important;
    }
  </style>
</head>
<body>

  <div id="loading">
    <div class="ld-logo">DISHIFY</div>
    <div class="ld-ring"></div>
    <div id="ld-msg">Starting AR…</div>
  </div>

  <div id="error">
    <div class="err-icon">⚠️</div>
    <div class="err-title">AR Unavailable</div>
    <div class="err-msg" id="err-msg">Something went wrong.</div>
    <a class="err-btn" id="err-back" href="#">← Back to Menu</a>
  </div>

  <div id="hud">
    <button id="back-btn" onclick="goBack()">← Back</button>
    <div id="item-pill"><span id="item-emoji">🍽️</span><span id="item-label">Loading…</span></div>
    <div class="corners"><span></span></div>
    <div id="scan-hint">
      <div class="hint-marker">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <rect width="512" height="512" fill="#fff"/>
          <rect x="20" y="20" width="472" height="472" fill="none" stroke="#000" stroke-width="20"/>
          <rect x="40" y="40" width="90" height="90" fill="#000"/><rect x="55" y="55" width="60" height="60" fill="#fff"/><rect x="68" y="68" width="34" height="34" fill="#000"/>
          <rect x="382" y="40" width="90" height="90" fill="#000"/><rect x="397" y="55" width="60" height="60" fill="#fff"/><rect x="410" y="68" width="34" height="34" fill="#000"/>
          <rect x="40" y="382" width="90" height="90" fill="#000"/><rect x="55" y="397" width="60" height="60" fill="#fff"/><rect x="68" y="410" width="34" height="34" fill="#000"/>
          <circle cx="256" cy="256" r="70" fill="#000"/><circle cx="256" cy="256" r="50" fill="#fff"/><circle cx="256" cy="256" r="30" fill="#000"/>
          <line x1="256" y1="155" x2="256" y2="175" stroke="#000" stroke-width="10"/>
          <line x1="256" y1="337" x2="256" y2="357" stroke="#000" stroke-width="10"/>
          <line x1="155" y1="256" x2="175" y2="256" stroke="#000" stroke-width="10"/>
          <line x1="337" y1="256" x2="357" y2="256" stroke="#000" stroke-width="10"/>
          <rect x="160" y="160" width="18" height="18" fill="#000"/><rect x="196" y="160" width="18" height="18" fill="#000"/>
          <rect x="298" y="160" width="18" height="18" fill="#000"/><rect x="334" y="160" width="18" height="18" fill="#000"/>
          <rect x="160" y="196" width="18" height="18" fill="#000"/><rect x="334" y="196" width="18" height="18" fill="#000"/>
          <rect x="160" y="298" width="18" height="18" fill="#000"/><rect x="334" y="298" width="18" height="18" fill="#000"/>
          <rect x="160" y="334" width="18" height="18" fill="#000"/><rect x="196" y="334" width="18" height="18" fill="#000"/>
          <rect x="298" y="334" width="18" height="18" fill="#000"/><rect x="334" y="334" width="18" height="18" fill="#000"/>
        </svg>
      </div>
      <div class="hint-text">Point your camera at the<br><strong>Dishify marker on your table</strong><br>to see the dish appear in 3D</div>
    </div>
    <div id="found-badge">✦ Dish Detected</div>
  </div>

  <div id="scene-container"></div>

  <script>
    const firebaseConfig={apiKey:"AIzaSyBvfA2VXcrx69iS-3VaCR9lA6mGyn6OicI",authDomain:"dishify-menu.firebaseapp.com",databaseURL:"https://dishify-menu-default-rtdb.firebaseio.com",projectId:"dishify-menu",storageBucket:"dishify-menu.firebasestorage.app",messagingSenderId:"182873179650",appId:"1:182873179650:web:8ff8cf3c04789d9f7b091b"};
    firebase.initializeApp(firebaseConfig);
    const db=firebase.database();

    const params=new URLSearchParams(location.search);
    const rid=params.get('r')||'';
    const itemName=params.get('item')||'';
    const modelParam=params.get('model')||'';

    // Track any blob URL we create so we can revoke it on unload
    let _mindBlobUrl = null;

    function goBack(){
      if(document.referrer.includes('menu.html'))history.back();
      else window.location.href='menu.html?r='+encodeURIComponent(rid);
    }
    document.getElementById('err-back').href='menu.html?r='+encodeURIComponent(rid);

    function msg(t){ document.getElementById('ld-msg').textContent=t; }

    function showError(txt){
      const loadEl=document.getElementById('loading');
      loadEl.classList.add('out');
      setTimeout(()=>{ loadEl.style.display='none'; }, 520);
      document.getElementById('err-msg').textContent=txt;
      document.getElementById('error').classList.add('show');
    }

    function convertModelUrl(url){
      if(!url) return '';
      const m1=url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
      if(m1) return `https://drive.google.com/uc?export=download&id=${m1[1]}`;
      const m2=url.match(/drive\.google\.com\/open\?id=([a-zA-Z0-9_-]+)/);
      if(m2) return `https://drive.google.com/uc?export=download&id=${m2[1]}`;
      return url;
    }

    /**
     * KEY FIX: Convert a base64 data URL → Blob URL.
     *
     * The compiled .mind file is stored in Firebase as a
     * "data:application/octet-stream;base64,..." string which can be
     * several megabytes long. Injecting that giant string directly into
     * the `imageTargetSrc` attribute of <a-scene> via innerHTML causes
     * mobile browsers to silently truncate the attribute value, corrupting
     * the target data so MindAR can never parse it — and arReady never fires.
     *
     * Converting to a Blob URL gives us a short "blob:https://..." string
     * that references the data already in memory. It's safe on all mobile
     * browsers and has no size limit.
     */
    function dataUrlToBlobUrl(dataUrl) {
      try {
        // Split "data:<mime>;base64,<data>"
        const [header, b64] = dataUrl.split(',');
        const mime = header.match(/:(.*?);/)[1];

        // Decode base64 → binary in chunks to avoid stack overflow
        const binStr = atob(b64);
        const bytes = new Uint8Array(binStr.length);
        for (let i = 0; i < binStr.length; i++) bytes[i] = binStr.charCodeAt(i);

        const blob = new Blob([bytes], { type: mime });
        return URL.createObjectURL(blob);
      } catch(e) {
        console.error('[AR] dataUrlToBlobUrl failed:', e);
        return null;
      }
    }

    async function init(){
      if(!rid||!itemName){
        showError('Missing info. Please scan the table QR code again.');
        return;
      }

      msg('Loading menu…');

      let restaurant=null, globalConfig=null;
      try{
        const [rSnap,cSnap]=await Promise.all([
          db.ref('restaurants/'+rid).once('value'),
          db.ref('config/globalMindTarget').once('value')
        ]);
        restaurant=rSnap.val();
        globalConfig=cSnap.val();
      } catch(e){
        showError('Could not connect. Check your internet and try again.');
        return;
      }

      if(!restaurant){ showError('Restaurant not found.'); return; }

      let item=null;
      if(restaurant.menu) item=Object.values(restaurant.menu).find(i=>i.name===itemName);

      let glbUrl=modelParam?convertModelUrl(decodeURIComponent(modelParam)):'';
      if(!glbUrl&&item&&item.model) glbUrl=convertModelUrl(item.model);
      if(!glbUrl){
        showError(`No 3D model is set for "${itemName}".\nAsk the restaurant admin to add a .glb model for this dish.`);
        return;
      }

      const rawMindUrl=globalConfig&&globalConfig.url?globalConfig.url:null;
      if(!rawMindUrl){
        showError('The AR marker hasn\'t been set up yet.\n\nAsk the admin to go to Admin Panel → QR Codes → Compile & Save Global Marker.\nThis only needs to be done once.');
        return;
      }

      // ── Convert .mind data URL → Blob URL ────────────────────────────────
      // This is the critical step for mobile. See comment on dataUrlToBlobUrl().
      msg('Preparing AR target…');
      let mindUrl = rawMindUrl;
      if (rawMindUrl.startsWith('data:')) {
        mindUrl = dataUrlToBlobUrl(rawMindUrl);
        if (!mindUrl) {
          showError('Failed to prepare AR data.\nPlease try again.');
          return;
        }
        _mindBlobUrl = mindUrl; // remember so we can revoke later
      }

      // Update HUD
      document.getElementById('item-label').textContent=itemName;
      document.getElementById('item-emoji').textContent=item?.emoji||'🍽️';

      msg('Loading 3D model…');

      // ── Resolve the final model URL ───────────────────────────────────────
      // Cloudinary raw resources and Google Drive export links both have CORS
      // issues when A-Frame's internal loader tries to fetch them on mobile.
      // Strategy: try to fetch + blob-ify first. If CORS blocks us, fall back
      // to the direct URL and let A-Frame try (works when the server allows it).
      let modelBlobUrl = glbUrl;
      try {
        const resp = await fetch(glbUrl, { credentials: 'omit' });
        if (resp.ok) {
          const buf = await resp.arrayBuffer();
          modelBlobUrl = URL.createObjectURL(
            new Blob([buf], { type: 'model/gltf-binary' })
          );
          console.log('[AR] GLB pre-fetched as blob URL');
        }
      } catch(e) {
        console.warn('[AR] GLB prefetch failed (CORS?), using direct URL:', e);
        modelBlobUrl = glbUrl;
      }

      msg('Starting camera…');

      const arScale=item&&item.arScale?item.arScale:'0.12 0.12 0.12';

      // Build the a-scene WITHOUT the imageTargetSrc in the HTML string.
      // Setting a multi-megabyte blob/data URL via innerHTML attribute interpolation
      // can be silently truncated by mobile browsers. We set it via setAttribute()
      // AFTER the element is in the DOM — this path has no size limit.
      // Register the model blob URL as an A-Frame asset so it loads reliably
      // before the scene entities reference it. This avoids the race condition
      // where a-gltf-model tries to resolve src before the blob is ready.
      document.getElementById('scene-container').innerHTML=`
        <a-scene id="ar-scene"
          color-space="sRGB"
          renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true;"
          vr-mode-ui="enabled: false"
          device-orientation-permission-ui="enabled: false">
          <a-assets id="ar-assets" timeout="30000">
            <a-asset-item id="dish-model-asset" src="${modelBlobUrl}"></a-asset-item>
          </a-assets>
          <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
          <a-light type="ambient" color="#ffffff" intensity="1.2"></a-light>
          <a-light type="directional" color="#ffffff" intensity="1.5" position="1 2 1"></a-light>
          <a-entity mindar-image-target="targetIndex: 0" id="ar-target">
            <a-gltf-model
              id="dish-gltf"
              src="#dish-model-asset"
              position="0 0 0.06"
              rotation="-90 0 0"
              scale="${arScale}"
              visible="true"
              animation__spin="property: rotation; from: -90 0 0; to: -90 360 0; loop: true; dur: 9000; easing: linear">
            </a-gltf-model>
            <a-ring color="#c9a84c" radius-inner="0.08" radius-outer="0.14"
              position="0 0 0.002" rotation="-90 0 0" opacity="0.22"
              material="transparent: true; side: double">
            </a-ring>
          </a-entity>
        </a-scene>`;

      // Set the large mindar-image attribute safely via JS
      const sceneEl = document.getElementById('ar-scene');
      sceneEl.setAttribute('mindar-image',
        `imageTargetSrc: ${mindUrl}; filterMinCF: 0.01; filterBeta: 0.01; webcamFacingMode: environment;`);

      const scene=sceneEl;

      let arStarted=false;

      function onArReady(){
        if(arStarted) return;
        arStarted=true;

        // ── Confirm model src is set; re-apply if somehow wiped by MindAR init ──
        const modelEl = document.getElementById('dish-gltf');
        if(modelEl){
          // If MindAR wiped the src attribute, restore it directly
          if(!modelEl.getAttribute('src')){
            modelEl.setAttribute('src', modelBlobUrl);
          }
          modelEl.setAttribute('visible', 'true');
          modelEl.addEventListener('model-loaded', () => {
            console.log('[AR] ✅ Model loaded');
            modelEl.setAttribute('visible', 'true');
          });
          modelEl.addEventListener('model-error', (e) => console.error('[AR] ❌ Model error:', e.detail));
        }

        document.getElementById('loading').classList.add('out');
        document.getElementById('hud').classList.add('show');
      }

      function onArError(){
        if(arStarted) return;
        arStarted=true;
        showError('Camera could not start.\nPlease allow camera access and reload the page.');
      }

      scene.addEventListener('arReady', onArReady, {once:true});
      scene.addEventListener('arError', onArError, {once:true});

      // ── Runtime video visibility patch ──────────────────────────────────
      // On some mobile browsers MindAR's injected <video> element has its
      // style reset after mount, collapsing it to 0×0 and producing a black
      // frame. We poll briefly after arReady to re-apply full-screen sizing.
      scene.addEventListener('arReady', () => {
        const enforceVideoVisible = () => {
          document.querySelectorAll('video').forEach(v => {
            v.style.cssText = [
              'position:fixed','top:0','left:0',
              'width:100vw','height:100vh',
              'object-fit:cover','z-index:0',
              'background:transparent','display:block',
              'visibility:visible','opacity:1'
            ].join('!important;') + '!important';
          });
        };
        // Apply immediately and again after a short delay (catches late resets)
        enforceVideoVisible();
        setTimeout(enforceVideoVisible, 300);
        setTimeout(enforceVideoVisible, 800);
      }, {once:true});

      // ── Safety-net timeout ──────────────────────────────────────────────
      // On some mobile browsers (especially iOS Safari) neither arReady nor
      // arError fires if camera permission is denied silently or if the
      // browser's getUserMedia is blocked. After 25 s we show a helpful error
      // rather than leaving the user on an infinite spinner.
      const arTimeout = setTimeout(()=>{
        if(!arStarted){
          arStarted=true;
          showError(
            'AR is taking too long to start.\n\n' +
            'Please check:\n' +
            '• Camera permission is allowed for this site\n' +
            '• You are using Chrome (Android) or Safari (iOS)\n' +
            '• The page is served over HTTPS\n\n' +
            'Tap "← Back" and try again.'
          );
        }
      }, 25000);

      scene.addEventListener('arReady', ()=>clearTimeout(arTimeout), {once:true});
      scene.addEventListener('arError', ()=>clearTimeout(arTimeout), {once:true});

      scene.addEventListener('loaded', ()=>{
        const target=document.getElementById('ar-target');
        if(!target) return;
        target.addEventListener('targetFound', ()=>{
          document.getElementById('hud').classList.add('found');
          document.getElementById('scan-hint').classList.add('gone');
          document.getElementById('found-badge').classList.add('show');
          // Explicitly make the model visible when the target is found.
          // MindAR sets the parent entity visible=false when the target is lost
          // and visible=true when found, but the child gltf-model can sometimes
          // be stuck with visible=false if it loaded while the entity was hidden.
          const m = document.getElementById('dish-gltf');
          if(m) m.setAttribute('visible', 'true');
        });
        target.addEventListener('targetLost', ()=>{
          document.getElementById('hud').classList.remove('found');
          document.getElementById('scan-hint').classList.remove('gone');
          document.getElementById('found-badge').classList.remove('show');
        });
      });
    }

    // Clean up blob URL when user navigates away
    window.addEventListener('pagehide', ()=>{
      if(_mindBlobUrl) URL.revokeObjectURL(_mindBlobUrl);
    });

    init();
  </script>
</body>
</html>
