<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Menu — Dishify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- Google's model-viewer for proper WebXR AR -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: rgba(201,168,76,0.12);
      --ink: #070604;
      --ink2: #0e0d0a;
      --ink3: #181510;
      --cream: #f0e8d5;
      --cream-dim: rgba(240,232,213,0.55);
    }
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    body { background:var(--ink); color:var(--cream); font-family:'Outfit',sans-serif; min-height:100vh; }

    /* NAV */
    nav {
      position: sticky; top:0; z-index:100;
      background: rgba(7,6,4,0.85);
      backdrop-filter: blur(20px) saturate(150%);
      border-bottom: 1px solid #2a2520;
      padding: 0 40px;
      display: flex; align-items: center; justify-content: space-between;
      height: 70px;
    }
    .nav-logo { font-family:'Cormorant Garamond',serif; font-size:1.6rem; font-weight:300; color:var(--gold); letter-spacing:0.1em; text-decoration:none; }
    .nav-restaurant { font-size:0.75rem; letter-spacing:0.15em; color:var(--cream-dim); text-transform:uppercase; }
    .cart-btn {
      display:flex; align-items:center; gap:8px;
      background:transparent; border:1px solid var(--gold);
      color:var(--gold); padding:10px 22px; border-radius:2px;
      font-family:'Outfit',sans-serif; font-size:0.78rem;
      font-weight:500; letter-spacing:0.1em; text-transform:uppercase;
      cursor:pointer; transition:all 0.3s;
    }
    .cart-btn:hover { background:var(--gold); color:var(--ink); }
    .cart-count {
      background:var(--gold); color:var(--ink);
      width:18px; height:18px; border-radius:50%;
      font-size:0.7rem; font-weight:700;
      display:flex; align-items:center; justify-content:center;
    }
    .cart-btn:hover .cart-count { background:var(--ink); color:var(--gold); }

    /* HERO BAND */
    .menu-hero {
      height: 280px;
      position: relative;
      display: flex; align-items: flex-end;
      overflow: hidden;
    }
    .menu-hero-bg {
      position:absolute; inset:0;
      background: linear-gradient(to bottom, rgba(7,6,4,0.1) 0%, var(--ink) 100%),
                  url('https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=1200&q=80') center/cover;
      filter: saturate(0.7) brightness(0.6);
      transform: scale(1.02);
    }
    .menu-hero-content { position:relative; z-index:2; padding:40px; }
    .breadcrumb { font-size:0.7rem; letter-spacing:0.3em; color:var(--cream-dim); text-transform:uppercase; margin-bottom:10px; }
    .breadcrumb a { color:var(--gold); text-decoration:none; }
    #r-name { font-family:'Cormorant Garamond',serif; font-size:3.5rem; font-weight:300; color:var(--cream); line-height:1; }
    #r-cuisine { font-size:0.8rem; letter-spacing:0.3em; color:var(--gold); text-transform:uppercase; margin-top:8px; }

    /* CATEGORY TABS */
    .cat-tabs {
      position:sticky; top:70px; z-index:90;
      background:rgba(7,6,4,0.9); backdrop-filter:blur(20px);
      border-bottom:1px solid #2a2520;
      display:flex; gap:0; overflow-x:auto;
      scrollbar-width:none;
    }
    .cat-tabs::-webkit-scrollbar { display:none; }
    .cat-tab {
      flex-shrink:0; padding:16px 28px;
      font-size:0.75rem; font-weight:500; letter-spacing:0.2em;
      text-transform:uppercase; color:var(--cream-dim);
      border:none; background:transparent; cursor:pointer;
      border-bottom:2px solid transparent; transition:all 0.25s;
    }
    .cat-tab.active { color:var(--gold); border-bottom-color:var(--gold); }
    .cat-tab:hover { color:var(--cream); }

    /* MAIN LAYOUT */
    .menu-body { display:grid; grid-template-columns:1fr 360px; gap:0; max-width:1400px; margin:0 auto; }
    @media(max-width:1100px) { .menu-body { grid-template-columns:1fr; } .order-panel { display:none; } }

    /* MENU ITEMS */
    .menu-content { padding:50px 40px; }
    .category-section { margin-bottom:60px; }
    .cat-title {
      font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:300;
      color:var(--gold); margin-bottom:4px;
    }
    .cat-divider { width:40px; height:1px; background:var(--gold); opacity:0.5; margin-bottom:28px; }

    .item-card {
      display:grid; grid-template-columns:1fr auto;
      gap:20px; align-items:start;
      background:var(--ink2); border:1px solid #2a2520;
      border-radius:6px; padding:24px;
      margin-bottom:14px; cursor:pointer;
      transition:all 0.35s cubic-bezier(0.16,1,0.3,1);
      position:relative; overflow:hidden;
    }
    .item-card::before {
      content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
      background:var(--gold); transform:scaleY(0); transition:transform 0.3s;
      transform-origin:bottom;
    }
    .item-card:hover { border-color:#3a3020; transform:translateX(4px); }
    .item-card:hover::before { transform:scaleY(1); }

    .item-left { display:flex; gap:18px; align-items:flex-start; }
    .item-emoji { font-size:2.2rem; flex-shrink:0; margin-top:2px; }
    .item-info { flex:1; }
    .item-name { font-family:'Cormorant Garamond',serif; font-size:1.25rem; font-weight:400; color:var(--cream); margin-bottom:5px; }
    .item-desc { font-size:0.82rem; color:var(--cream-dim); line-height:1.65; margin-bottom:10px; }
    .item-badges { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
    .badge { font-size:0.62rem; letter-spacing:0.2em; text-transform:uppercase; padding:3px 10px; border-radius:2px; border:1px solid; }
    .badge-ar { color:#4caf7d; border-color:rgba(76,175,125,0.3); background:rgba(76,175,125,0.05); }
    .badge-spicy { color:#e07840; border-color:rgba(224,120,64,0.3); background:rgba(224,120,64,0.05); }
    .badge-veg { color:#7db86c; border-color:rgba(125,184,108,0.3); background:rgba(125,184,108,0.05); }
    .item-price { font-family:'Cormorant Garamond',serif; font-size:1.4rem; color:var(--gold); font-weight:400; }

    .item-right { display:flex; flex-direction:column; align-items:flex-end; gap:12px; }
    .ar-btn {
      display:flex; align-items:center; gap:6px;
      background:transparent; border:1px solid rgba(76,175,125,0.5);
      color:#4caf7d; padding:8px 14px; border-radius:3px;
      font-size:0.7rem; font-weight:500; letter-spacing:0.15em; text-transform:uppercase;
      cursor:pointer; transition:all 0.25s; white-space:nowrap;
    }
    .ar-btn:hover { background:rgba(76,175,125,0.1); border-color:#4caf7d; }
    .add-btn {
      width:36px; height:36px; border-radius:50%;
      background:var(--gold-dim); border:1px solid var(--gold);
      color:var(--gold); font-size:1.3rem; line-height:1;
      cursor:pointer; transition:all 0.25s;
      display:flex; align-items:center; justify-content:center;
    }
    .add-btn:hover { background:var(--gold); color:var(--ink); transform:scale(1.1); }

    /* ORDER PANEL */
    .order-panel {
      background:var(--ink2); border-left:1px solid #2a2520;
      padding:40px 30px; position:sticky; top:134px;
      height:calc(100vh - 134px); overflow-y:auto;
      display:flex; flex-direction:column;
    }
    .panel-title { font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:300; color:var(--gold); margin-bottom:24px; }
    .order-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--cream-dim); font-size:0.85rem; gap:12px; }
    .order-empty span { font-size:3rem; opacity:0.3; }
    .order-items { flex:1; }
    .order-item { display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:1px solid #2a2520; font-size:0.88rem; }
    .order-item-name { color:var(--cream); }
    .order-item-qty { color:var(--cream-dim); font-size:0.78rem; margin-top:2px; }
    .order-item-price { color:var(--gold); }
    .order-total { display:flex; justify-content:space-between; padding:20px 0 0; border-top:1px solid #3a3020; margin-top:8px; }
    .order-total span:first-child { font-size:0.8rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--cream-dim); }
    .order-total span:last-child { font-family:'Cormorant Garamond',serif; font-size:1.4rem; color:var(--gold); }
    .place-order-btn { width:100%; padding:16px; background:var(--gold); color:var(--ink); border:none; border-radius:3px; font-family:'Outfit',sans-serif; font-weight:600; font-size:0.88rem; letter-spacing:0.12em; text-transform:uppercase; cursor:pointer; margin-top:20px; transition:all 0.3s; }
    .place-order-btn:hover { background:var(--gold-light); transform:translateY(-1px); }

    /* AR MODAL */
    #ar-modal {
      position:fixed; inset:0; z-index:1000;
      background:rgba(0,0,0,0.95); display:none;
      flex-direction:column;
    }
    #ar-modal.open { display:flex; }
    .ar-modal-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:20px 30px; border-bottom:1px solid #2a2520;
      background:var(--ink2);
    }
    .ar-modal-title { font-family:'Cormorant Garamond',serif; font-size:1.4rem; color:var(--gold); }
    .ar-close { background:transparent; border:1px solid #3a3020; color:var(--cream-dim); width:38px; height:38px; border-radius:50%; font-size:1.2rem; cursor:pointer; transition:all 0.2s; }
    .ar-close:hover { border-color:var(--gold); color:var(--gold); }
    .ar-viewer-wrap { flex:1; position:relative; display:flex; align-items:center; justify-content:center; }
    model-viewer {
      width:100%; height:100%;
      background:transparent;
      --poster-color:transparent;
    }
    .ar-instructions {
      padding:20px 30px; background:var(--ink2); border-top:1px solid #2a2520;
      display:flex; align-items:center; gap:16px;
    }
    .ar-instructions p { font-size:0.8rem; color:var(--cream-dim); line-height:1.5; }
    .ar-launch-btn {
      flex-shrink:0; padding:12px 24px;
      background:var(--gold); color:var(--ink);
      border:none; border-radius:3px;
      font-family:'Outfit',sans-serif; font-weight:600; font-size:0.8rem;
      letter-spacing:0.1em; text-transform:uppercase;
      cursor:pointer; transition:all 0.25s; white-space:nowrap;
    }
    .ar-launch-btn:hover { background:var(--gold-light); }

    /* Toast */
    .toast {
      position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
      background:var(--ink3); border:1px solid var(--gold);
      color:var(--cream); padding:14px 24px; border-radius:4px;
      font-size:0.85rem; z-index:500;
      animation:toastIn 0.3s ease forwards;
      white-space:nowrap;
    }
    @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

    /* Loading */
    .loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:50vh; gap:20px; color:var(--cream-dim); }
    .loading-ring { width:48px; height:48px; border:2px solid #2a2520; border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    @media(max-width:600px) {
      nav{padding:0 20px}
      .menu-content{padding:30px 20px}
      .item-card{grid-template-columns:1fr}
      .item-right{flex-direction:row; justify-content:space-between}
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="index.html">DISHIFY</a>
    <span class="nav-restaurant" id="nav-rest-name">Loading…</span>
    <button class="cart-btn" onclick="toggleCart()">
      <span>Order</span>
      <span class="cart-count" id="cart-count">0</span>
    </button>
  </nav>

  <!-- HERO -->
  <div class="menu-hero">
    <div class="menu-hero-bg" id="menu-hero-bg"></div>
    <div class="menu-hero-content">
      <div class="breadcrumb"><a href="index.html">Home</a> / Menu</div>
      <h1 id="r-name">Loading…</h1>
      <div id="r-cuisine"></div>
    </div>
  </div>

  <!-- CATEGORY TABS -->
  <div class="cat-tabs" id="cat-tabs"></div>

  <!-- MAIN -->
  <div class="menu-body">
    <div class="menu-content" id="menu-content">
      <div class="loading"><div class="loading-ring"></div><span>Loading menu…</span></div>
    </div>

    <!-- ORDER SIDEBAR -->
    <div class="order-panel" id="order-panel">
      <div class="panel-title">Your Order</div>
      <div class="order-empty" id="order-empty">
        <span>🍽️</span>
        <p>Your selections will appear here</p>
      </div>
      <div class="order-items" id="order-items-list" style="display:none"></div>
      <div id="order-footer" style="display:none">
        <div class="order-total"><span>Total</span><span id="order-total-price">PKR 0</span></div>
        <button class="place-order-btn" onclick="placeOrder()">Place Order</button>
      </div>
    </div>
  </div>

  <!-- AR MODAL -->
  <div id="ar-modal">
    <div class="ar-modal-header">
      <div class="ar-modal-title" id="ar-item-name">View in AR</div>
      <button class="ar-close" onclick="closeAR()">✕</button>
    </div>
    <div class="ar-viewer-wrap">
      <model-viewer id="mv"
        camera-controls
        auto-rotate
        ar
        ar-modes="webxr scene-viewer quick-look"
        shadow-intensity="1"
        environment-image="neutral"
        exposure="1">
      </model-viewer>
    </div>
    <div class="ar-instructions">
      <p>🥽 Tap <strong>View in AR</strong> to place this dish on your table using your camera. Works on Android (WebXR) and iOS (Quick Look).</p>
      <button class="ar-launch-btn" onclick="launchAR()">View in AR 📷</button>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBvfA2VXcrx69iS-3VaCR9lA6mGyn6OicI",
      authDomain: "dishify-menu.firebaseapp.com",
      databaseURL: "https://dishify-menu-default-rtdb.firebaseio.com",
      projectId: "dishify-menu",
      storageBucket: "dishify-menu.firebasestorage.app",
      messagingSenderId: "182873179650",
      appId: "1:182873179650:web:8ff8cf3c04789d9f7b091b"
    };
    firebase.initializeApp(firebaseConfig);

    const rid = new URLSearchParams(location.search).get('r');
    let cart = [];
    let currentModelSrc = '';

    const cuisineImages = {
      'Italian':'https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=1200&q=80',
      'Pakistani':'https://images.unsplash.com/photo-1631515243349-e0cb75fb8d3a?w=1200&q=80',
      'Japanese':'https://images.unsplash.com/photo-1617196034183-421b4040ed20?w=1200&q=80',
      'American':'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=1200&q=80',
      'default':'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=1200&q=80'
    };

    if (!rid) { document.getElementById('r-name').textContent = 'Restaurant not found'; }
    else {
      firebase.database().ref('restaurants/' + rid).on('value', snap => {
        const r = snap.val();
        if (!r) { document.getElementById('r-name').textContent = 'Not found'; return; }

        document.title = r.name + ' — Dishify';
        document.getElementById('r-name').textContent = r.name;
        document.getElementById('r-cuisine').textContent = r.cuisine || '';
        document.getElementById('nav-rest-name').textContent = r.name;

        const heroEl = document.getElementById('menu-hero-bg');
        const img = cuisineImages[r.cuisine] || cuisineImages['default'];
        heroEl.style.background = `linear-gradient(to bottom, rgba(7,6,4,0.1) 0%, var(--ink) 100%), url('${img}') center/cover`;

        const menu = r.menu ? Object.values(r.menu) : [];
        renderMenu(menu);
      });
    }

    function renderMenu(items) {
      const cats = [...new Set(items.map(i => i.category || 'Other'))];
      
      // Tabs
      const tabsEl = document.getElementById('cat-tabs');
      tabsEl.innerHTML = cats.map((c, i) =>
        `<button class="cat-tab ${i===0?'active':''}" onclick="scrollToCategory('${c}', this)">${c}</button>`
      ).join('');

      // Sections
      let html = '';
      cats.forEach(cat => {
        const catItems = items.filter(i => (i.category||'Other') === cat);
        html += `<div class="category-section" id="cat-${cat.replace(/\s+/g,'-')}">
          <h2 class="cat-title">${cat}</h2>
          <div class="cat-divider"></div>`;
        catItems.forEach(item => {
          const badges = [];
          if (item.hasAR || item.model) badges.push(`<span class="badge badge-ar">✦ AR</span>`);
          if (item.spicy) badges.push(`<span class="badge badge-spicy">🌶 Spicy</span>`);
          if (item.vegetarian) badges.push(`<span class="badge badge-veg">🌿 Veg</span>`);

          html += `<div class="item-card" onclick="addToCart('${escStr(item.name)}', ${item.price})">
            <div class="item-left">
              <div class="item-emoji">${item.emoji||'🍽️'}</div>
              <div class="item-info">
                <div class="item-name">${item.name}</div>
                <div class="item-desc">${item.desc||''}</div>
                <div class="item-badges">${badges.join('')}</div>
                <div class="item-price">PKR ${Number(item.price).toLocaleString()}</div>
              </div>
            </div>
            <div class="item-right">
              ${(item.hasAR || item.model) ? `<button class="ar-btn" onclick="event.stopPropagation(); openAR('${escStr(item.model)}','${escStr(item.name)}')">🥽 View AR</button>` : ''}
              <button class="add-btn" onclick="event.stopPropagation(); addToCart('${escStr(item.name)}', ${item.price})">+</button>
            </div>
          </div>`;
        });
        html += `</div>`;
      });
      document.getElementById('menu-content').innerHTML = html || '<p style="color:var(--cream-dim);padding:40px">No items on this menu yet.</p>';
    }

    function escStr(s) { return (s||'').replace(/'/g, "\\'"); }

    function scrollToCategory(name, el) {
      document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      const target = document.getElementById('cat-' + name.replace(/\s+/g,'-'));
      if (target) target.scrollIntoView({ behavior:'smooth', block:'start' });
    }

    // CART
    function addToCart(name, price) {
      const existing = cart.find(i => i.name === name);
      if (existing) existing.qty++;
      else cart.push({ name, price, qty: 1 });
      updateCart();
      showToast(`${name} added to order`);
    }

    function updateCart() {
      const count = cart.reduce((s,i) => s + i.qty, 0);
      const total = cart.reduce((s,i) => s + i.price * i.qty, 0);
      document.getElementById('cart-count').textContent = count;

      const empty = document.getElementById('order-empty');
      const list = document.getElementById('order-items-list');
      const footer = document.getElementById('order-footer');

      if (cart.length === 0) {
        empty.style.display = 'flex'; list.style.display = 'none'; footer.style.display = 'none';
      } else {
        empty.style.display = 'none'; list.style.display = 'block'; footer.style.display = 'block';
        list.innerHTML = cart.map(i => `
          <div class="order-item">
            <div><div class="order-item-name">${i.name}</div><div class="order-item-qty">x${i.qty}</div></div>
            <div class="order-item-price">PKR ${(i.price * i.qty).toLocaleString()}</div>
          </div>`).join('');
        document.getElementById('order-total-price').textContent = `PKR ${total.toLocaleString()}`;
      }
    }

    function placeOrder() {
      if (!cart.length) return;
      const items = cart.map(i => `${i.name} x${i.qty}`).join(', ');
      showToast('✓ Order placed! Staff will assist you shortly.');
      cart = []; updateCart();
    }

    // AR
    function openAR(modelSrc, itemName) {
      const modal = document.getElementById('ar-modal');
      const mv = document.getElementById('mv');
      document.getElementById('ar-item-name').textContent = itemName;
      currentModelSrc = modelSrc;
      mv.src = modelSrc;
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function launchAR() {
      const mv = document.getElementById('mv');
      if (mv.canActivateAR) { mv.activateAR(); }
      else { showToast('AR not supported on this browser/device. Try Chrome on Android.'); }
    }

    function closeAR() {
      document.getElementById('ar-modal').classList.remove('open');
      document.body.style.overflow = '';
    }

    // Toast
    function showToast(msg) {
      const old = document.querySelector('.toast');
      if (old) old.remove();
      const t = document.createElement('div');
      t.className = 'toast'; t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2800);
    }

    function toggleCart() {
      const panel = document.getElementById('order-panel');
      panel.style.display = panel.style.display === 'none' ? 'flex' : 'flex';
    }
  </script>
</body>
</html>
