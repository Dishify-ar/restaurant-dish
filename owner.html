<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orders — Dishify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <style>
    :root{--gold:#c9a84c;--gold-light:#e8c97a;--gold-dim:rgba(201,168,76,0.12);--ink:#070604;--ink2:#0e0d0a;--ink3:#181510;--cream:#f0e8d5;--cream-dim:rgba(240,232,213,0.55);--green:#4caf7d;--red:#bf4040;--amber:#e0a020}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--ink);color:var(--cream);font-family:'Outfit',sans-serif;min-height:100vh}

    /* LOGIN */
    #login-screen{position:fixed;inset:0;z-index:1000;background:var(--ink);display:flex;align-items:center;justify-content:center}
    .login-box{background:var(--ink2);border:1px solid #2a2520;border-radius:8px;padding:60px 50px;width:420px;max-width:90vw;text-align:center}
    .login-logo{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:300;color:var(--gold);letter-spacing:.1em;margin-bottom:6px}
    .login-sub{font-size:.68rem;letter-spacing:.4em;text-transform:uppercase;color:var(--cream-dim);margin-bottom:40px}
    .login-label{display:block;text-align:left;font-size:.68rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
    .login-input{width:100%;padding:14px 18px;background:#13110d;border:1px solid #3a3020;color:var(--cream);border-radius:3px;font-family:'Outfit',sans-serif;font-size:.95rem;margin-bottom:20px;transition:border-color .2s}
    .login-input:focus{outline:none;border-color:var(--gold)}
    .login-btn{width:100%;padding:15px;background:var(--gold);color:var(--ink);border:none;border-radius:3px;font-family:'Outfit',sans-serif;font-weight:600;font-size:.85rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .3s}
    .login-btn:hover{background:var(--gold-light)}
    .login-err{color:var(--red);font-size:.82rem;margin-top:12px;height:20px}

    /* APP */
    #app{display:none}
    header{background:var(--ink2);border-bottom:1px solid #2a2520;padding:0 40px;height:70px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
    .header-logo{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;color:var(--gold);letter-spacing:.1em}
    .header-right{display:flex;align-items:center;gap:16px}
    .live-badge{display:flex;align-items:center;gap:6px;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--green);padding:6px 14px;border:1px solid rgba(76,175,125,.3);border-radius:2px;background:rgba(76,175,125,.05)}
    .live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
    .logout-btn{padding:8px 18px;background:transparent;border:1px solid #3a3020;color:var(--cream-dim);border-radius:3px;font-family:'Outfit',sans-serif;font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .25s}
    .logout-btn:hover{border-color:var(--red);color:var(--red)}

    main{padding:40px;max-width:1400px;margin:0 auto}
    .page-title{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:300;color:var(--cream);margin-bottom:4px}
    .page-subtitle{font-size:.78rem;color:var(--cream-dim);letter-spacing:.05em;margin-bottom:32px}

    /* RESTAURANT TABS */
    .rest-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px}
    .rest-tab{padding:10px 22px;background:var(--ink2);border:1px solid #2a2520;border-radius:3px;color:var(--cream-dim);font-size:.78rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:8px}
    .rest-tab:hover{border-color:#3a3020;color:var(--cream)}
    .rest-tab.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
    .rest-tab .badge-new{background:var(--red);color:white;border-radius:50%;width:18px;height:18px;font-size:.65rem;display:flex;align-items:center;justify-content:center;font-weight:700}

    /* STATS */
    .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
    .stat{background:var(--ink2);border:1px solid #2a2520;border-radius:6px;padding:22px 24px}
    .stat-val{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:300;color:var(--gold);line-height:1}
    .stat-label{font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--cream-dim);margin-top:4px}

    /* ORDERS GRID */
    .orders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px}
    .order-card{background:var(--ink2);border:1px solid #2a2520;border-radius:8px;padding:24px;position:relative;transition:border-color .3s;animation:cardIn .4s cubic-bezier(.16,1,.3,1) both}
    @keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .order-card.status-new{border-left:3px solid var(--gold)}
    .order-card.status-preparing{border-left:3px solid var(--amber)}
    .order-card.status-ready{border-left:3px solid var(--green)}
    .order-card.status-done{border-left:3px solid #444;opacity:.6}
    .order-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
    .order-id{font-size:.68rem;letter-spacing:.25em;text-transform:uppercase;color:var(--cream-dim)}
    .order-table{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--cream);margin-top:2px}
    .order-time{font-size:.72rem;color:var(--cream-dim);text-align:right}
    .order-items-list{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid #2a2520}
    .order-line{display:flex;justify-content:space-between;font-size:.85rem;padding:5px 0}
    .order-line-name{color:var(--cream)}
    .order-line-qty{color:var(--cream-dim);font-size:.78rem}
    .order-line-price{color:var(--gold);font-size:.85rem}
    .order-total-row{display:flex;justify-content:space-between;margin-bottom:16px}
    .order-total-row span:first-child{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--cream-dim)}
    .order-total-row span:last-child{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--gold)}
    .status-btns{display:flex;gap:8px;flex-wrap:wrap}
    .status-btn{flex:1;padding:9px 12px;border:none;border-radius:3px;font-family:'Outfit',sans-serif;font-size:.7rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .25s;min-width:80px}
    .btn-preparing{background:rgba(224,160,32,.15);border:1px solid rgba(224,160,32,.4);color:var(--amber)}
    .btn-preparing:hover{background:rgba(224,160,32,.25)}
    .btn-ready{background:rgba(76,175,125,.12);border:1px solid rgba(76,175,125,.4);color:var(--green)}
    .btn-ready:hover{background:rgba(76,175,125,.22)}
    .btn-done{background:#1a1815;border:1px solid #333;color:#666}
    .btn-done:hover{border-color:#555;color:#888}
    .status-chip{display:inline-flex;align-items:center;gap:5px;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;padding:4px 10px;border-radius:2px}
    .chip-new{color:var(--gold);background:var(--gold-dim);border:1px solid rgba(201,168,76,.25)}
    .chip-preparing{color:var(--amber);background:rgba(224,160,32,.08);border:1px solid rgba(224,160,32,.25)}
    .chip-ready{color:var(--green);background:rgba(76,175,125,.08);border:1px solid rgba(76,175,125,.25)}
    .chip-done{color:#555;background:#111;border:1px solid #222}

    .empty-orders{text-align:center;padding:80px 40px;color:var(--cream-dim)}
    .empty-orders h3{font-family:'Cormorant Garamond',serif;font-size:2rem;color:var(--gold);margin-bottom:8px}

    /* Notification bell */
    .notif-toast{position:fixed;top:90px;right:24px;background:var(--ink3);border:1px solid var(--gold);border-left:3px solid var(--gold);color:var(--cream);padding:16px 20px;border-radius:4px;font-size:.85rem;z-index:900;animation:slideLeft .4s cubic-bezier(.16,1,.3,1);max-width:300px}
    @keyframes slideLeft{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}

    @media(max-width:900px){.stats-row{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:600px){header{padding:0 20px}main{padding:20px}.stats-row{grid-template-columns:1fr 1fr}.orders-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">DISHIFY</div>
      <div class="login-sub">Restaurant Orders</div>
      <label class="login-label">Owner Password</label>
      <input class="login-input" type="password" id="pwd" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()">
      <button class="login-btn" onclick="login()">View Orders</button>
      <div class="login-err" id="login-err"></div>
    </div>
  </div>

  <div id="app">
    <header>
      <div class="header-logo">DISHIFY</div>
      <div class="header-right">
        <div class="live-badge"><div class="live-dot"></div>Live Orders</div>
        <button class="logout-btn" onclick="logout()">Sign Out</button>
      </div>
    </header>

    <main>
      <div class="page-title">Orders Dashboard</div>
      <div class="page-subtitle" id="page-subtitle">Loading restaurants…</div>

      <div class="stats-row">
        <div class="stat"><div class="stat-val" id="stat-new">0</div><div class="stat-label">New Orders</div></div>
        <div class="stat"><div class="stat-val" id="stat-prep">0</div><div class="stat-label">Preparing</div></div>
        <div class="stat"><div class="stat-val" id="stat-ready">0</div><div class="stat-label">Ready</div></div>
        <div class="stat"><div class="stat-val" id="stat-today">0</div><div class="stat-label">Total Today</div></div>
      </div>

      <div class="rest-tabs" id="rest-tabs"></div>

      <div class="orders-grid" id="orders-grid">
        <div class="empty-orders"><h3>No Orders Yet</h3><p>Orders from guests will appear here in real time.</p></div>
      </div>
    </main>
  </div>

  <script>
    // ── CHANGE THIS to match your admin.html password ──
    const OWNER_PASSWORD = 'dishify2024';

    const firebaseConfig = {
      apiKey:"AIzaSyBvfA2VXcrx69iS-3VaCR9lA6mGyn6OicI",authDomain:"dishify-menu.firebaseapp.com",
      databaseURL:"https://dishify-menu-default-rtdb.firebaseio.com",projectId:"dishify-menu",
      storageBucket:"dishify-menu.firebasestorage.app",messagingSenderId:"182873179650",
      appId:"1:182873179650:web:8ff8cf3c04789d9f7b091b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allOrders = {};      // { orderId: orderObj }
    let restaurants = {};    // { rid: {name,..} }
    let activeRid = null;
    let knownOrderIds = new Set();
    let initialized = false;

    function login() {
      const val = document.getElementById('pwd').value;
      if (val === OWNER_PASSWORD) {
        sessionStorage.setItem('dishify_owner_orders','1');
        showApp();
      } else {
        document.getElementById('login-err').textContent = 'Incorrect password.';
        document.getElementById('pwd').value='';
      }
    }
    function logout() { sessionStorage.removeItem('dishify_owner_orders'); location.reload(); }
    if (sessionStorage.getItem('dishify_owner_orders')==='1') showApp();

    function showApp() {
      document.getElementById('login-screen').style.display='none';
      document.getElementById('app').style.display='block';
      initDashboard();
    }

    function initDashboard() {
      // Load restaurant names first
      db.ref('restaurants').on('value', snap => {
        restaurants = {};
        (snap.val()||{});
        Object.entries(snap.val()||{}).forEach(([k,v])=>restaurants[k]=v);
        renderRestaurantTabs();
      });

      // Live orders listener
      db.ref('orders').on('value', snap => {
        const raw = snap.val() || {};
        allOrders = {};
        Object.entries(raw).forEach(([rid, orders]) => {
          Object.entries(orders).forEach(([oid, order]) => {
            allOrders[oid] = { ...order, _rid: rid, _oid: oid };
          });
        });

        // Notification for new orders (after init)
        if (initialized) {
          Object.values(allOrders).forEach(o => {
            if (!knownOrderIds.has(o._oid) && o.status === 'new') {
              showNotif(`🔔 New order from ${o.table || 'Walk-in'}!`);
            }
          });
        }
        Object.keys(allOrders).forEach(id => knownOrderIds.add(id));
        initialized = true;

        updateStats();
        renderOrders();
      });
    }

    function renderRestaurantTabs() {
      const tabs = document.getElementById('rest-tabs');
      const rids = Object.keys(restaurants);
      if (!rids.length) { tabs.innerHTML='<p style="color:var(--cream-dim);font-size:.85rem">No restaurants yet.</p>'; return; }

      // Count new orders per restaurant
      const newCounts = {};
      Object.values(allOrders).forEach(o => {
        if (o.status==='new') newCounts[o._rid] = (newCounts[o._rid]||0)+1;
      });

      tabs.innerHTML = `<button class="rest-tab ${!activeRid?'active':''}" onclick="setRid(null)">All Restaurants</button>` +
        rids.map(rid => {
          const nc = newCounts[rid]||0;
          return `<button class="rest-tab ${activeRid===rid?'active':''}" onclick="setRid('${rid}')">
            ${restaurants[rid]?.emoji||'🍽️'} ${restaurants[rid]?.name||rid}
            ${nc>0?`<span class="badge-new">${nc}</span>`:''}
          </button>`;
        }).join('');

      document.getElementById('page-subtitle').textContent = activeRid
        ? `Showing orders for ${restaurants[activeRid]?.name}`
        : `Showing all restaurants · ${Object.keys(restaurants).length} venue${Object.keys(restaurants).length!==1?'s':''}`;
    }

    function setRid(rid) { activeRid=rid; renderRestaurantTabs(); renderOrders(); }

    function updateStats() {
      const orders = Object.values(allOrders);
      const today = new Date().toDateString();
      document.getElementById('stat-new').textContent = orders.filter(o=>o.status==='new').length;
      document.getElementById('stat-prep').textContent = orders.filter(o=>o.status==='preparing').length;
      document.getElementById('stat-ready').textContent = orders.filter(o=>o.status==='ready').length;
      document.getElementById('stat-today').textContent = orders.filter(o=>new Date(o.timestamp).toDateString()===today).length;
    }

    function renderOrders() {
      const grid = document.getElementById('orders-grid');
      let orders = Object.values(allOrders);
      if (activeRid) orders = orders.filter(o=>o._rid===activeRid);

      // Sort: new first, then by timestamp desc
      const statusOrder = {new:0,preparing:1,ready:2,done:3};
      orders.sort((a,b)=>{
        const sd = (statusOrder[a.status]||0)-(statusOrder[b.status]||0);
        return sd !== 0 ? sd : b.timestamp - a.timestamp;
      });

      if (!orders.length) {
        grid.innerHTML=`<div class="empty-orders"><h3>No Orders</h3><p>${activeRid?'No orders for this restaurant yet.':'Waiting for first order…'}</p></div>`;
        return;
      }

      grid.innerHTML = orders.map(o => {
        const restName = restaurants[o._rid]?.name || 'Unknown';
        const chip = {
          new:`<span class="status-chip chip-new">✦ New</span>`,
          preparing:`<span class="status-chip chip-preparing">⏳ Preparing</span>`,
          ready:`<span class="status-chip chip-ready">✓ Ready</span>`,
          done:`<span class="status-chip chip-done">Done</span>`
        }[o.status]||'';

        const itemsHtml = (o.items||[]).map(i=>`
          <div class="order-line">
            <span class="order-line-name">${i.name} <span class="order-line-qty">×${i.qty}</span></span>
            <span class="order-line-price">PKR ${(i.price*i.qty).toLocaleString()}</span>
          </div>`).join('');

        const actionBtns = o.status !== 'done' ? `
          <div class="status-btns">
            ${o.status!=='preparing'&&o.status!=='ready'?`<button class="status-btn btn-preparing" onclick="updateStatus('${o._rid}','${o._oid}','preparing')">⏳ Preparing</button>`:''}
            ${o.status!=='ready'?`<button class="status-btn btn-ready" onclick="updateStatus('${o._rid}','${o._oid}','ready')">✓ Ready</button>`:''}
            <button class="status-btn btn-done" onclick="updateStatus('${o._rid}','${o._oid}','done')">✓ Done</button>
          </div>` : '<p style="font-size:.75rem;color:#555;letter-spacing:.1em">Order completed</p>';

        return `<div class="order-card status-${o.status}">
          <div class="order-header">
            <div>
              <div class="order-id">#${o.id} · ${activeRid?'':restName}</div>
              <div class="order-table">${o.table||'Walk-in'}</div>
            </div>
            <div class="order-time">${chip}<br><span style="font-size:.68rem;color:var(--cream-dim)">${o.timestampStr||''}</span></div>
          </div>
          <div class="order-items-list">${itemsHtml}</div>
          <div class="order-total-row"><span>Total</span><span>PKR ${(o.total||0).toLocaleString()}</span></div>
          ${actionBtns}
        </div>`;
      }).join('');
    }

    function updateStatus(rid, oid, status) {
      db.ref(`orders/${rid}/${oid}/status`).set(status);
    }

    function showNotif(msg) {
      const old=document.querySelector('.notif-toast'); if(old) old.remove();
      const t=document.createElement('div'); t.className='notif-toast'; t.textContent=msg;
      document.body.appendChild(t);
      // Try audio ping
      try { const ctx=new AudioContext(); const o=ctx.createOscillator(); const g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value=880; g.gain.setValueAtTime(0.3,ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4); o.start(); o.stop(ctx.currentTime+0.4); } catch(e){}
      setTimeout(()=>t.remove(),4000);
    }
  </script>
</body>
</html>
